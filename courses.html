<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h4 class="text-center mb-4">Select Courses</h4>
        <div class="form-check"><input type="checkbox" class="c" value="Web"> Web Engineering</div>
        <div class="form-check"><input type="checkbox" class="c" value="AI"> Cyber Securitt</div>
        <div class="form-check"><input type="checkbox" class="c" value="DB"> Block chain</div>
        <button class="btn btn-primary w-100 mt-4" onclick="save()">Submit</button>
        <div id="msg" class="alert alert-success mt-3 d-none text-center">Courses Registered!</div>
        <a href="dashboard.html" class="text-center d-block mt-3">Back to Dashboard</a>
    </div>

    <script>
        function save() {
            let selected = [];
            document.querySelectorAll('.c:checked').forEach(x => selected.push(x.value));
            if(selected.length > 0) {
                alert("Joined: " + selected.join(", "));
                document.getElementById('msg').classList.remove('d-none');
            } else {
                alert("Please select a course!");
            }
        }
    </script>
</body>
</html>
