<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h3 class="text-center mb-4">Feedback</h3>
        <form id="fForm">
            <input type="text" class="form-control mb-2" placeholder="Name" required>
            <textarea class="form-control mb-2" placeholder="Comments" required></textarea>
            <select class="form-select mb-3" required>
                <option value="">Rate Us</option>
                <option>Good</option>
                <option>Average</option>
            </select>
            <button type="submit" class="btn btn-dark w-100">Submit Feedback</button>
        </form>
        <a href="dashboard.html" class="text-center d-block mt-3">Back</a>
    </div>
    <script>
        document.getElementById('fForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Feedback Submitted!");
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
