<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h3 class="text-center text-success mb-4">Registration</h3>
        <form id="regForm">
            <input type="text" id="name" class="form-control mb-2" placeholder="Name">
            <input type="email" id="email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="p1" class="form-control mb-2" placeholder="Password">
            <input type="password" id="p2" class="form-control mb-2" placeholder="Confirm Password">
            <input type="text" id="age" class="form-control mb-3" placeholder="Age">
            <button type="submit" class="btn btn-success w-100">Submit</button>
        </form>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            let n = document.getElementById('name').value;
            let em = document.getElementById('email').value;
            let pass1 = document.getElementById('p1').value;
            let pass2 = document.getElementById('p2').value;
            let a = document.getElementById('age').value;

            if(n=="" || em=="" || pass1=="" || a=="") {
                alert("Fill all boxes!");
            } else if (pass1 != pass2) {
                alert("Passwords match error!");
            } else if (isNaN(a)) {
                alert("Age must be a number!");
            } else {
                localStorage.setItem("user", n);
                localStorage.setItem("userEmail", em);
                localStorage.setItem("userAge", a);
                window.location.href = "dashboard.html";
            }
        };
    </script>
</body>
</html>
