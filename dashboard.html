<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Dashboard</span>
            <div>
                <a href="courses.html" class="text-white me-3">Courses</a>
                <a href="feedback.html" class="text-white">Feedback</a>
            </div>
        </div>
    </nav>
    <div class="container d-flex justify-content-center">
        <div class="card p-4 shadow-sm" style="max-width: 500px; width: 100%;">
            <h2 id="welcome" class="text-primary">Hello!</h2>
            <hr>
            <p><strong>Email:</strong> <span id="dEmail"></span></p>
            <p><strong>Age:</strong> <span id="dAge"></span></p>
            <button class="btn btn-outline-dark mt-3" onclick="showTime()">Show Time</button>
            <p id="time" class="mt-2 fw-bold"></p>
        </div>
    </div>

    <script>
        document.getElementById('welcome').innerText = "Welcome, " + localStorage.getItem("user");
        document.getElementById('dEmail').innerText = localStorage.getItem("userEmail");
        document.getElementById('dAge').innerText = localStorage.getItem("userAge");

        function showTime() {
            document.getElementById('time').innerText = new Date().toLocaleString();
        }
    </script>
</body>
</html>
